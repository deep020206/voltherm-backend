# Server
server.port=8080

# Data Paths (local development)
app.images.dir=src/main/resources/static/images
app.pdfs.dir=src/main/resources/static/pdfs
app.products.json=src/main/resources/data/products.json
app.inquiries.json=src/main/resources/data/inquiries.json
app.contact-info.json=src/main/resources/data/contact-info.json
app.certificates.json=src/main/resources/data/certificates.json

# Admin Credentials (dev only - weak password acceptable)
admin.username=admin
admin.password=admin123

# Logging (verbose for debugging)
logging.level.root=INFO
logging.level.com.voltherm=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Development hints
spring.devtools.restart.enabled=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# TODO: Configure your email username
spring.mail.username=your-email@gmail.com
# TODO: Configure your email password (use App Password for Gmail)
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Company email to receive inquiry notifications
# TODO: Configure company email address
voltherm.email.company=company@voltherm.com
