# Server
server.port=8080

# Data Paths (local development)
app.images.dir=src/main/resources/static/images
app.pdfs.dir=src/main/resources/static/pdfs
app.products.json=src/main/resources/data/products.json
app.inquiries.json=src/main/resources/data/inquiries.json
app.contact-info.json=src/main/resources/data/contact-info.json
app.certificates.json=src/main/resources/data/certificates.json

# Admin Credentials (dev only - weak password acceptable)
admin.username=admin
admin.password=admin123

# Logging (verbose for debugging)
logging.level.root=INFO
logging.level.com.voltherm=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Development hints
spring.devtools.restart.enabled=true
