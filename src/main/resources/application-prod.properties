# Server
server.port=${PORT:8080}

# Data Paths (production - external storage)
app.images.dir=${APP_IMAGES_DIR:/opt/app-data/images}
app.pdfs.dir=${APP_PDFS_DIR:/opt/app-data/pdfs}
app.products.json=${APP_PRODUCTS_JSON:/opt/app-data/products.json}
app.inquiries.json=${APP_INQUIRIES_JSON:/opt/app-data/inquiries.json}
app.contact-info.json=${APP_CONTACT_INFO_JSON:/opt/app-data/contact-info.json}
app.certificates.json=${APP_CERTIFICATES_JSON:/opt/app-data/certificates.json}

# ⚠️ CRITICAL: Admin Credentials (MUST use environment variables in production)
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# Logging (minimal for performance)
logging.level.root=WARN
logging.level.com.voltherm=INFO

# Security headers
server.error.include-message=never
server.error.include-stacktrace=never

# Session security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://voltherm.vercel.app}
